<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RUDY BALDWIN - Psychic Reader and Dream Translator</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Be Vietnam Pro", sans-serif;
      }
      body {
        background: #0f172a;
        color: #fff;
      }
      .container {
        max-width: 480px;
        margin: auto;
        padding: 16px;
      }
      .chat-box {
        background: #1e293b;
        border-radius: 16px;
        padding: 12px;
        height: 100vh;
        overflow-y: auto;
        margin-top: 16px;
      }
      .msg {
        margin-bottom: 10px;
        padding: 10px 12px;
        border-radius: 12px;
        max-width: 80%;
        font-size: 14px;
        line-height: 1.4;
      }
      .bot {
        background: #334155;
      }
      .user {
        background: #22c55e;
        margin-left: auto;
        color: #000;
      }
      select {
        width: 32%;
        padding: 6px;
        border-radius: 6px;
        border: none;
      }
      .btn {
        width: 100%;
        background: linear-gradient(135deg, #d1180a, #f1716f);
        color: #022c22;
        padding: 10px;
        border-radius: 12px;
        border: none;
        font-weight: 700;
        margin-top: 6px;
        box-shadow: 0 6px 14px rgba(34, 197, 94, 0.4);
        cursor: pointer;
        transition: all 0.2s ease;
      }
      .btn:hover {
        transform: scale(1.03);
        box-shadow: 0 8px 18px rgba(34, 197, 94, 0.5);
      }
      .btn:active {
        transform: scale(0.97);
      }
      @keyframes pulseBtn {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.05);
        }
        100% {
          transform: scale(1);
        }
      }
      .btn.pulse {
        animation: pulseBtn 1.2s infinite;
      }

      .bot-row {
        display: flex;
        gap: 8px;
        align-items: flex-start;
      }

      .avatar {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        border: 2px solid #f59e0b; /* viền vàng nổi bật */
        box-shadow: 0 0 6px rgba(245, 158, 11, 0.6);
      }

      .avatar {
        animation: pulse 1.5s infinite;
      }

      @keyframes pulse {
        0% {
          box-shadow: 0 0 6px rgba(245, 158, 11, 0.6);
        }
        50% {
          box-shadow: 0 0 12px rgba(245, 158, 11, 1);
        }
        100% {
          box-shadow: 0 0 6px rgba(245, 158, 11, 0.6);
        }
      }

      .bot-name {
        background: rgba(245, 158, 11, 0.1);
        padding: 2px 6px;
        border-radius: 6px;
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }

      .bot-text {
        font-size: 14px;
      }

      .online-dot {
        width: 8px;
        height: 8px;
        background: #22c55e;
        border-radius: 50%;
        animation: blink 1.2s infinite;
      }

      @keyframes blink {
        0% {
          opacity: 1;
        }
        50% {
          opacity: 0.3;
        }
        100% {
          opacity: 1;
        }
      }

      .next-btn {
        width: 100%;
        background: linear-gradient(135deg, #f59e0b, #f97316);
        color: #fff;
        padding: 12px;
        border-radius: 14px;
        border: none;
        font-weight: 700;
        font-size: 14px;
        box-shadow: 0 6px 14px rgba(249, 115, 22, 0.4);
        cursor: pointer;
        animation: pulseBtn 1.2s infinite;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="chat-box" id="chat"></div>
    </div>

    <script>
      const chat = document.getElementById("chat");

      function randomDelay(min, max) {
        return Math.floor(Math.random() * (max - min) + min);
      }

      // HÀM CHÈN ẢNH
      function sendImage(src, callback) {
        const div = document.createElement("div");
        div.className = "msg bot";

        const img = document.createElement("img");
        img.src = src;
        img.style.maxWidth = "100%";
        img.style.borderRadius = "10px";
        img.style.marginTop = "6px";

        img.onload = () => {
          chat.scrollTop = chat.scrollHeight;
          setTimeout(() => {
            if (callback) callback();
          }, 500);
        };

        div.appendChild(img);
        chat.appendChild(div);
      }

      function showTyping() {
        const div = document.createElement("div");
        div.className = "msg bot";
        div.innerText = "Đang nhập...";
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
        return div;
      }

      function typeMessage(text, type, callback) {
        const typingDiv = showTyping();

        setTimeout(
          () => {
            typingDiv.remove();

            const div = document.createElement("div");
            div.className = "msg " + type;
            if (type === "bot") {
              div.innerHTML = `
    <div class="bot-row">
      <img src="images/avatar.jpg" class="avatar">
      <div>
        <div class="bot-name">Rudy Baldwin <span class="online-dot"></span></div>
        <div class="bot-text"></div>
      </div>
    </div>
  `;
            }
            chat.appendChild(div);

            let i = 0;
            function typing() {
              if (i < text.length) {
                // 👇 FIX xử lý <br>
                if (text.substring(i, i + 4) === "<br>") {
                  if (type === "bot") {
                    div.querySelector(".bot-text").innerHTML += "<br>";
                  } else {
                    div.innerHTML += "<br>";
                  }
                  i += 4;
                } else {
                  if (type === "bot") {
                    div.querySelector(".bot-text").innerHTML += text.charAt(i);
                  } else {
                    div.innerHTML += text.charAt(i);
                  }
                  i++;
                }

                setTimeout(typing, 40); //Tốc độ Chạy chữ
              } else {
                chat.scrollTop = chat.scrollHeight;
                if (callback) callback();
              }
            }
            typing();
          },
          randomDelay(800, 1500),
        );
      }

      // ✅ CHỈ SỬA PHẦN HIỂN THỊ DOB (đưa vào chat)
      function showDOB() {
        const div = document.createElement("div");
        div.className = "msg user";
        div.id = "dobForm";

        div.innerHTML = `
          <div style="display:flex; gap:4px; margin-bottom:6px;">
            <select id="day"></select>
            <select id="month"></select>
            <select id="year"></select>
          </div>
          <button onclick="submitDOB()" class="btn pulse">Xác nhận</button>
        `;

        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;

        initSelect();
      }

      function initSelect() {
        const day = document.getElementById("day");
        const month = document.getElementById("month");
        const year = document.getElementById("year");

        if (day.options.length > 0) return;

        for (let i = 1; i <= 31; i++) {
          day.innerHTML += `<option value="${i}">${i}</option>`;
        }

        const months = [
          "January",
          "February",
          "March",
          "April",
          "May",
          "June",
          "July",
          "August",
          "September",
          "October",
          "November",
          "December",
        ];

        for (let i = 1; i <= 12; i++) {
          month.innerHTML += `<option value="${i}">${months[i - 1]}</option>`;
        }

        for (let i = 1950; i <= 2005; i++) {
          year.innerHTML += `<option value="${i}">${i}</option>`;
        }
      }

      function submitDOB() {
        const d = parseInt(document.getElementById("day").value);
        const m = parseInt(document.getElementById("month").value);
        const y = parseInt(document.getElementById("year").value);

        const userDiv = document.createElement("div");
        userDiv.className = "msg user";
        userDiv.innerHTML = `
  <div class="user-row">
    <div class="user-bubble">
      <div class="user-name">${userName}</div>
      <div>Mình sinh ngày ${d}/${m}/${y}</div>
    </div>
  </div>
`;

        chat.appendChild(userDiv);

        // ✅ xoá đúng form DOB
        const form = document.getElementById("dobForm");
        if (form) form.remove();

        chat.scrollTop = chat.scrollHeight;

        // Hàm CUNG HOÀNG ĐẠO
        function getZodiac(d, m) {
          if ((d >= 21 && m == 3) || (d <= 19 && m == 4)) return "Aries";
          if ((d >= 20 && m == 4) || (d <= 20 && m == 5)) return "Taurus";
          if ((d >= 21 && m == 5) || (d <= 20 && m == 6)) return "Gemini";
          if ((d >= 21 && m == 6) || (d <= 22 && m == 7)) return "Cancer";
          if ((d >= 23 && m == 7) || (d <= 22 && m == 8)) return "Leo";
          if ((d >= 23 && m == 8) || (d <= 22 && m == 9)) return "Virgo";
          if ((d >= 23 && m == 9) || (d <= 22 && m == 10)) return "Libra";
          if ((d >= 23 && m == 10) || (d <= 21 && m == 11)) return "Scorpio";
          if ((d >= 22 && m == 11) || (d <= 21 && m == 12))
            return "Sagittarius";
          if ((d >= 22 && m == 12) || (d <= 19 && m == 1)) return "Capricorn";
          if ((d >= 20 && m == 1) || (d <= 18 && m == 2)) return "Aquarius";
          return "Pisces";
        }

        // HÀM CON GIÁP
        function getChineseZodiac(year) {
          const animals = [
            "Monkey",
            "Rooster",
            "Dog",
            "Pig",
            "Rat",
            "Ox",
            "Tiger",
            "Rabbit",
            "Dragon",
            "Snake",
            "Horse",
            "Goat",
          ];
          return animals[year % 12];
        }

        // Gán Ảnh vào Cung hoàng đạo
        const zodiacImageMap = {
          Aries: "images/zodiac-1.jpg",
          Taurus: "images/zodiac-2.jpg",
          Gemini: "images/zodiac-3.jpg",
          Cancer: "images/zodiac-4.jpg",
          Leo: "images/zodiac-5.jpg",
          Virgo: "images/zodiac-6.jpg",
          Libra: "images/zodiac-7.jpg",
          Scorpio: "images/zodiac-8.jpg",
          Sagittarius: "images/zodiac-9.jpg",
          Capricorn: "images/zodiac-10.jpg",
          Aquarius: "images/zodiac-11.jpg",
          Pisces: "images/zodiac-12.jpg",
        };

        const animalImageMap = {
          Rat: "images/animal-1.jpg",
          Ox: "images/animal-2.jpg",
          Tiger: "images/animal-3.jpg",
          Rabbit: "images/animal-4.jpg",
          Dragon: "images/animal-5.jpg",
          Snake: "images/animal-6.jpg",
          Horse: "images/animal-7.jpg",
          Goat: "images/animal-8.jpg",
          Monkey: "images/animal-9.jpg",
          Rooster: "images/animal-10.jpg",
          Dog: "images/animal-11.jpg",
          Pig: "images/animal-12.jpg",
        };

        // Gán Nội dung theo Cung hoàng đạo
        const zodiacContentMap = {
          Aries: "You are bold, energetic and love challenges 🔥",
          Taurus: "You are stable, patient and value security 💰",
          Gemini: "You are smart, flexible and love communication 💬",
          Cancer: "You are emotional, caring and intuitive 💖",
          Leo: "You are confident, charismatic and love attention 👑",
          Virgo: "You are practical, detail-oriented and analytical 🧠",
          Libra: "You seek balance, harmony and beauty ⚖️",
          Scorpio: "You are intense, mysterious and powerful 🦂",
          Sagittarius: "You love freedom, adventure and exploration 🌍",
          Capricorn: "You are disciplined, ambitious and determined 🏔️",
          Aquarius: "You are creative, unique and forward-thinking ⚡",
          Pisces: "You are dreamy, sensitive and artistic 🎨",
        };
        const animalContentMap = {
          Rat: "Quick-witted, smart and resourceful 🐭",
          Ox: "Strong, reliable and hardworking 🐂",
          Tiger: "Brave, confident and competitive 🐅",
          Rabbit: "Gentle, elegant and kind 🐇",
          Dragon: "Powerful, lucky and full of energy 🐉",
          Snake: "Wise, calm and mysterious 🐍",
          Horse: "Energetic, free-spirited and active 🐎",
          Goat: "Calm, creative and gentle 🐐",
          Monkey: "Smart, curious and playful 🐒",
          Rooster: "Confident, honest and observant 🐓",
          Dog: "Loyal, honest and protective 🐕",
          Pig: "Generous, kind and easy-going 🐖",
        };
        // ⚠️ GIỮ NGUYÊN FLOW
        const zodiac = getZodiac(d, m);
        const animal = getChineseZodiac(y);

        typeMessage("Ok để mình check cho bạn...", "bot", () => {
          setTimeout(
            () => {
              typeMessage(`Your zodiac sign is ${zodiac}`, "bot", () => {
                sendImage(zodiacImageMap[zodiac], () => {
                  typeMessage(zodiacContentMap[zodiac], "bot", () => {
                    typeMessage(`Chinese zodiac: ${animal}`, "bot", () => {
                      sendImage(animalImageMap[animal], () => {
                        typeMessage(animalContentMap[animal], "bot", () => {
                          typeMessage(
                            "Mình chốt cho bạn 2 số 👇",
                            "bot",
                            () => {
                              typeMessage(randomNumber(), "bot", () => {
                                setTimeout(() => {
                                  showNextButton();
                                }, 800);
                              });
                            },
                          );
                        });
                      });
                    });
                  });
                });
              });
            },
            randomDelay(1000, 2000),
          );
        });
      }

      function randomNumber() {
        let a = Math.floor(Math.random() * 43); // 0–42
        let b;

        do {
          b = Math.floor(Math.random() * 43);
        } while (b === a); // đảm bảo khác nhau

        return `👉 ${a.toString().padStart(2, "0")} - ${b.toString().padStart(2, "0")}`;
      }

      const userName =
        new URLSearchParams(window.location.search).get("name") || "bạn";
      const userGender =
        new URLSearchParams(window.location.search).get("gender") || "other";

      function getPronoun() {
        if (userGender === "male") return "Mr";
        if (userGender === "female") return "Mrs";
        return "You";
      }

      function showNextButton() {
        const div = document.createElement("div");
        div.className = "msg user";

        div.innerHTML = `
    <button class="next-btn" onclick="goNext()">
      Xem kết quả chi tiết 👉
    </button>
  `;

        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
      }

      function goNext() {
        window.location.href = "https://www.google.com"; // 👈 đổi link theo bạn
      }

      function startChat() {
        typeMessage(
          `Hello ${getPronoun()} ${userName} 👋 <br> Ako si Rudy Baldwin. Isang Physic reader at Astrologo.`,
          "bot",
          () => {
            typeMessage(
              "Ngayong Mayo, 3 zodiac signs ang makakaranas ng life-changing luck, at 2 zodiac signs ang makakaharap sa kamalasan. <br> Alin ang magiging...? 🤖",
              "bot",
              () => {
                typeMessage(
                  "Hayaan mong basahin ko ang iyong horoscope. 🎯 <br> Una, mangyaring sabihin sa akin ang iyong petsa ng kapanganakan.",
                  "bot",
                  () => {
                    showDOB();
                  },
                );
              },
            );
          },
        );
      }

      setTimeout(startChat, 800);
    </script>
  </body>
</html>
